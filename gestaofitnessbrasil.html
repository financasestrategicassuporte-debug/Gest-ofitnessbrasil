<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workshop Gestão Fitness Brasil</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a3a3a 0%, #0d2b2b 50%, #1a4040 100%);
      display: flex; align-items: center; justify-content: center; padding: 2rem;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 2.5rem 2rem;
      width: 100%; max-width: 460px; text-align: center;
    }
    .icon-wrap {
      width: 72px; height: 72px; background: #25D366;
      border-radius: 18px; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 1rem;
    }
    .icon-wrap svg { width: 40px; height: 40px; fill: white; }
    .project-name {
      color: rgba(255,255,255,0.45);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    h1 { color: white; font-size: 22px; font-weight: 600; margin-bottom: .75rem; }
    p { color: rgba(255,255,255,.65); font-size: 14px; line-height: 1.6; margin-bottom: 1.75rem; }
    .btn-row { display: flex; gap: 12px; margin-bottom: 12px; }
    .btn {
      flex: 1; padding: 14px 10px; border-radius: 10px;
      font-size: 15px; font-weight: 500; cursor: pointer;
      border: none; display: flex; align-items: center;
      justify-content: center; gap: 8px; text-decoration: none;
    }
    .btn-android { background: #25D366; color: white; }
    .btn-ios { background: rgba(255,255,255,.12); color: white; border: 1px solid rgba(255,255,255,.25); }
    .btn-copy {
      width: 100%; padding: 16px; border-radius: 10px;
      background: linear-gradient(90deg, #667eea, #9b59b6);
      color: white; font-size: 15px; font-weight: 500;
      cursor: pointer; border: none; display: flex;
      align-items: center; justify-content: center; gap: 10px;
      text-decoration: none; margin-bottom: 1.5rem;
    }
    .btn-copy .sub { font-size: 12px; color: rgba(255,255,255,.7); display: block; }
    .countdown { color: rgba(255,255,255,.5); font-size: 14px; }
    .countdown span { color: #25D366; font-weight: 600; }
    .copied { display: none; color: #25D366; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </div>
    <div class="project-name">Workshop Gestão Fitness Brasil</div>
    <h1>Acessando o Grupo.....</h1>
    <p>Você está sendo redirecionado para o grupo do WhatsApp.<br>Se não abrir automaticamente, use os botões abaixo.</p>
    <div class="btn-row">
      <a class="btn btn-android" href="https://chat.whatsapp.com/HjqWMTEK3BxCksmDq0mKfj">
        <svg width="16" height="16" fill="white" viewBox="0 0 24 24"><path d="M17.523 15.34c-.3-.15-1.767-.872-2.04-.971-.273-.099-.471-.149-.67.15-.198.298-.768.97-.941 1.17-.174.198-.348.222-.645.075-.298-.149-1.258-.464-2.395-1.48-.885-.79-1.482-1.764-1.656-2.062-.173-.298-.018-.459.13-.607.134-.134.299-.348.447-.521.149-.174.199-.298.299-.497.099-.198.05-.371-.025-.521-.075-.148-.67-1.615-.916-2.21-.243-.58-.488-.5-.67-.51-.172-.008-.37-.01-.569-.01-.198 0-.521.075-.793.372-.272.298-1.04 1.02-1.04 2.483 0 1.463 1.065 2.876 1.213 3.075.149.198 2.095 3.2 5.076 4.487.709.307 1.262.489 1.694.626.712.226 1.36.194 1.872.118.57-.085 1.758-.719 2.006-1.413.247-.695.247-1.29.173-1.413-.074-.124-.272-.198-.57-.347"/></svg>
        Android
      </a>
      <a class="btn btn-ios" href="https://chat.whatsapp.com/HjqWMTEK3BxCksmDq0mKfj">
        <svg width="16" height="16" fill="white" viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        iPhone / iOS
      </a>
    </div>
    <a class="btn-copy" href="#" onclick="copyLink(event)">
      <svg width="18" height="18" fill="white" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
      <span>
        <strong>Copiar Link do Grupo</strong>
        <span class="sub">Cole no WhatsApp para acessar</span>
      </span>
    </a>
    <div class="countdown">Redirecionando automaticamente em <span id="timer">8</span>s...</div>
    <div class="copied" id="copiedMsg">✓ Link copiado!</div>
  </div>
  <script>
    const WA = "https://chat.whatsapp.com/HjqWMTEK3BxCksmDq0mKfj";
    let s = 8;
    const t = document.getElementById("timer");
    const interval = setInterval(() => {
      s--; t.textContent = s;
      if(s <= 0) { clearInterval(interval); window.location.href = WA; }
    }, 1000);
    function copyLink(e) {
      e.preventDefault();
      navigator.clipboard.writeText(WA).then(() => {
        const msg = document.getElementById("copiedMsg");
        msg.style.display = "block";
        setTimeout(() => msg.style.display = "none", 2000);
      });
    }
  </script>
</body>
</html>
